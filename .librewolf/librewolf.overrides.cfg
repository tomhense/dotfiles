// Override 4501 to disable Resist Fingerprinting feature
// resistFingerprinting overrides fingerprintingProtection, so these must be disabled
defaultPref("privacy.resistFingerprinting", false);
defaultPref("privacy.resistFingerprinting.pbmode", false);
defaultPref("privacy.resistFingerprinting.letterboxing", true);

// At least one of these two must be enabled
defaultPref("privacy.fingerprintingProtection", true);
defaultPref("privacy.fingerprintingProtection.pbmode", true);
defaultPref("privacy.fingerprintingProtection.overrides", "+AllTargets,-CSSPrefersColorScheme,-SiteSpecificZoom");

// Override 5009 to disable open with option in download dialog
defaultPref("browser.download.forbid_open_with", true);

// Override to enable session restore
defaultPref("browser.sessionstore.privacy_level", 0);  // 1003 optional to restore cookies/formdata
defaultPref("privacy.clearOnShutdown.history", false);  // 2811

// Customize where new tabs are located in the tab bar
defaultPref("browser.tabs.insertAfterCurrent", true);  // Open Related Tabs Next to Current, Others at the End of the Bar (default is false)

// Disable chrome animations
// When using kde the system motion duration setting is honored
//defaultPref("ui.prefersReducedMotion", 1);

// Disable autocopy default [LINUX]
defaultPref("clipboard.autocopy", false);

// Override to disable autoplay if you did not interact with the site
// 0=sticky (default), 1=transient, 2=user
defaultPref("media.autoplay.blocking_policy", 2);

// Customize backspace behavior
// 0=previous page, 1=scroll up, 2=do nothing
defaultPref("browser.backspace_action", 2);

// disable Ctrl-Q quit shortcut [LINUX] [MAC]
defaultPref("browser.quitShortcut.disabled", true);

// disable default browser check on startup
defaultPref("browser.shell.checkDefaultBrowser", false);

// open bookmarks in a new tab
defaultPref("browser.tabs.loadBookmarksInTabs", true);
defaultPref("browser.urlbar.decodeURLsOnCopy", true); // see bugzilla 1320061

// disable alt key toggling the menu bar [RESTART]
defaultPref("ui.key.menuAccessKey", 0);

// view "page/selection source" in a new window
//defaultPref("view_source.tab", false);

// enforced extension signing (Nightly/ESR)
defaultPref("xpinstall.signatures.required", false);

// Disable native gtk window titlebar
defaultPref("browser.tabs.inTitlebar", 1);

// Enable switching tabs by scrolling in the tabbar
defaultPref("toolkit.tabbox.switchByScrolling", true);

// Force reader mode to be available on all pages
defaultPref("reader.parse-on-load.force-enabled", true);

// Use os locale settings
defaultPref("intl.regional_prefs.use_os_locales", true);

// Enable change numbers by mouse wheel
defaultPref("dom.input.number_and_range_modified_by_mousewheel", true);

// Keep history basically forever
defaultPref("places.history.expiration.max_pages", 2000000);
